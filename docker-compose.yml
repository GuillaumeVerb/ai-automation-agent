services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./:/workspace
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    ports:
      - "8000:8000"
  ui:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./:/workspace
    command: streamlit run ui/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    env_file:
      - .env
    environment:
      UI_API_BASE_URL: http://api:8000
    depends_on:
      - api
    ports:
      - "8501:8501"
